<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Matches the dark theme chrome (--header-background-color) so the browser/OS toolbar blends in. -->
    <meta name="theme-color" content="#1e1e1e" />
    <meta name="description" content="Arcane Dictionary — a D&D 5e character manager: build characters and browse spells, classes, races, feats and items, fully offline." />
    <!-- iOS standalone presentation (Safari ignores most of the web manifest). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Arcane Dictionary" />
    <!-- Social/link sharing. -->
    <meta property="og:title" content="Arcane Dictionary" />
    <meta property="og:description" content="A D&D 5e character manager — build characters and browse the SRD, fully offline." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/pwa-512x512.png" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" href="/icons/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png">
    <!-- The manifest <link> is injected by vite-plugin-pwa (/manifest.webmanifest); do not add a
         second one here or the document ends up with two conflicting manifests. -->
    <title>Arcane Dictionary</title>
    <style>
      /* Dark base so there is never a white flash before the app's theme CSS loads. */
      html, body { margin: 0; background: #121212; }
      /* Static app-shell loader: paints from HTML/CSS with zero JS, then index.tsx clears
         #root and mounts the app over it. Colors match the dark theme (#121212 / #189ad1). */
      .app-shell-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px;
        background: #121212; color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      }
      .app-shell-loader__spinner {
        width: 40px; height: 40px; border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.18); border-top-color: #189ad1;
        animation: app-shell-spin 0.8s linear infinite;
      }
      .app-shell-loader__text { margin: 0; font-size: 0.95rem; opacity: 0.8; }
      @keyframes app-shell-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .app-shell-loader__spinner { animation: none; } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="app-shell-loader" role="status" aria-live="polite" aria-label="Loading Arcane Dictionary">
        <div class="app-shell-loader__spinner" aria-hidden="true"></div>
        <p class="app-shell-loader__text">Loading Arcane Dictionary…</p>
      </div>
    </div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
